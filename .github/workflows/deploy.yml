name: Deploy

on:
  push:
    branches:
      - main


jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # - name: Run Linter (Optional)
      #   run: npm run lint

      # - name: Run Tests (Optional)
      #   run: npm test

      - name: Notify Discord on Build Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{ "content": "🚨 **빌드 실패**\n**프로젝트:** VocaLoop\n**브랜치:** `${{ github.ref_name }}`\n**커밋:** `${{ env.SHORT_SHA }}`\n**메시지:** ${{ github.event.head_commit.message }}\n\nGitHub Actions 탭에서 로그를 확인해주세요." }' \
          "https://discord.com/api/webhooks/1471922958036504764/SLQ519CdjSLQ6gZAPrq2rZnej7rWL_hXCDbR1tvsbJs7WdZYmq6F-0KLdaLoJUfhOoEF"

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20 || nvm install 20
            
            cd ~/project/voca-loop/VocaLoop
            
            # 충돌 방지를 위해 강제 동기화
            git fetch origin main
            git reset --hard origin/main
            
            # 의존성 설치 및 빌드
            npm install
            npm run build:clean
            
            # PM2 재시작
            pm2 restart voca-loop --update-env || pm2 start server.js --name voca-loop

      - name: Notify Discord on Deploy Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{ "content": "✅ **배포 성공!**\n**프로젝트:** VocaLoop\n**브랜치:** `${{ github.ref_name }}`\n**커밋:** `${{ env.SHORT_SHA }}`\n**메시지:** ${{ github.event.head_commit.message }}\n\n서버에 성공적으로 배포되었습니다." }' \
          "https://discord.com/api/webhooks/1471922958036504764/SLQ519CdjSLQ6gZAPrq2rZnej7rWL_hXCDbR1tvsbJs7WdZYmq6F-0KLdaLoJUfhOoEF"

      - name: Notify Discord on Deploy Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{ "content": "🔥 **배포 실패**\n**프로젝트:** VocaLoop\n**브랜치:** `${{ github.ref_name }}`\n**커밋:** `${{ env.SHORT_SHA }}`\n**메시지:** ${{ github.event.head_commit.message }}\n\n서버 연결 또는 배포 스크립트를 확인해주세요." }' \
          "https://discord.com/api/webhooks/1471922958036504764/SLQ519CdjSLQ6gZAPrq2rZnej7rWL_hXCDbR1tvsbJs7WdZYmq6F-0KLdaLoJUfhOoEF"
